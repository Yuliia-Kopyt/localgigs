<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Edit — LocalGigs</title>
</head>
<body>

<h1>Редагувати концерт</h1>

<form method="post" action="/admin/edit/{{ concert.id }}">
    <p>
        <label>Назва:</label><br>
        <input type="text" name="title" value="{{ concert.title }}" required>
    </p>

    <p>
        <label>Місто:</label><br>
        <input type="text" name="city" value="{{ concert.city }}" required>
    </p>

    <p>
        <label>Місце:</label><br>
        <input type="text" name="venue" value="{{ concert.venue }}" required>
    </p>

    <p>
        <label>Жанр:</label><br>
        <input type="text" name="genre" value="{{ concert.genre }}" required>
    </p>

    <p>
        <label>Ціна:</label><br>
        <input type="text" name="price" value="{{ concert.price }}" required>
    </p>

    <p>
        <label>Дата події:</label><br>
        <input type="date" name="event_date" value="{{ concert.event_date }}" required>
    </p>

    <p>
        <label>URL фото:</label><br>
        <input type="url" name="image_url" value="{{ concert.image_url }}" required>
    </p>

    <p>
        <label>Контакт / квитки URL:</label><br>
        <input type="url" name="contact_url" value="{{ concert.contact_url }}" required>
    </p>

    <p>
        <label>Опис:</label><br>
        <textarea name="description" minlength="20" maxlength="500" required>{{ concert.description }}</textarea>
    </p>

    <p>
        <label>
            <input type="checkbox" name="is_featured" {% if concert.is_featured %}checked{% endif %}>
            Featured
        </label>
    </p>

    <button type="submit">Зберегти зміни</button>
</form>

<p>
    <a href="/admin">← Назад в адмінку</a>
</p>

</body>
</html>
