<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit — LocalGigs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<main class="admin-page">
    <section class="admin-card form-card">

        <div class="admin-header">
            <h1>Редагувати концерт</h1>
            <a class="secondary-button" href="/admin">← Назад</a>
        </div>

        <form method="post" action="/admin/edit/{{ concert.id }}" class="form-grid">

            <div class="form-field">
                <label>Назва</label>
                <input type="text" name="title" value="{{ concert.title }}" required>
            </div>

            <div class="form-field">
                <label>Місто</label>
                <input type="text" name="city" value="{{ concert.city }}" required>
            </div>

            <div class="form-field">
                <label>Місце</label>
                <input type="text" name="venue" value="{{ concert.venue }}" required>
            </div>

            <div class="form-field">
                <label>Жанр</label>
                <input type="text" name="genre" value="{{ concert.genre }}" required>
            </div>

            <div class="form-field">
                <label>Ціна</label>
                <input type="text" name="price" value="{{ concert.price }}" required>
            </div>

            <div class="form-field">
                <label>Дата події</label>
                <input type="date" name="event_date" value="{{ concert.event_date }}" required>
            </div>

            <div class="form-field">
                <label>URL фото</label>
                <input type="url" name="image_url" value="{{ concert.image_url }}" required>
            </div>

            <div class="form-field">
                <label>Контакт / квитки URL</label>
                <input type="url" name="contact_url" value="{{ concert.contact_url }}" required>
            </div>

            <div class="form-field">
                <label>Опис</label>
                <textarea name="description" minlength="20" maxlength="500" required>{{ concert.description }}</textarea>
            </div>

            <div class="form-field">
                <label>Організатор</label>
                <input type="text" name="organizer" value="{{ concert.organizer }}" required>
            </div>

            <div class="form-field">
                <label>Час початку</label>
                <input type="text" name="start_time" value="{{ concert.start_time }}" required>
            </div>

            <div class="form-field">
                <label>Тривалість</label>
                <input type="text" name="duration" value="{{ concert.duration }}" required>
            </div>

            <div class="form-field">
                <label>Вікове обмеження</label>
                <input type="text" name="age_limit" value="{{ concert.age_limit }}" required>
            </div>

            <div class="form-field">
                <label>Атмосфера</label>
                <input type="text" name="mood" value="{{ concert.mood }}" required>
            </div>

            <label class="checkbox-field">
                <input type="checkbox" name="is_featured" {% if concert.is_featured %}checked{% endif %}>
                Featured
            </label>

            <button class="admin-button" type="submit">
                Зберегти зміни
            </button>

        </form>

    </section>
</main>

</body>
</html>
