<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create — LocalGigs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<main class="admin-page">
    <section class="admin-card form-card">
        <div class="admin-header">
            <h1>Додати концерт</h1>
            <a class="secondary-button" href="/admin">← Назад</a>
        </div>

        <form method="post" action="/admin/create" class="form-grid">
            <div class="form-field">
                <label>Назва</label>
                <input type="text" name="title" required>
            </div>

            <div class="form-field">
                <label>Місто</label>
                <input type="text" name="city" required>
            </div>

            <div class="form-field">
                <label>Місце</label>
                <input type="text" name="venue" required>
            </div>

            <div class="form-field">
                <label>Жанр</label>
                <input type="text" name="genre" required>
            </div>

            <div class="form-field">
                <label>Ціна</label>
                <input type="text" name="price" placeholder="$10" required>
            </div>

            <div class="form-field">
                <label>Дата події</label>
                <input type="date" name="event_date" required>
            </div>

            <div class="form-field">
                <label>URL фото</label>
                <input type="url" name="image_url" required>
            </div>

            <div class="form-field">
                <label>Контакт / квитки URL</label>
                <input type="url" name="contact_url" required>
            </div>

            <div class="form-field">
                <label>Опис</label>
                <textarea name="description" minlength="20" maxlength="500" required></textarea>
            </div>

            <div class="form-field">
                <label>Організатор</label>
                <input type="text" name="organizer" required>
            </div>

            <div class="form-field">
                <label>Час початку</label>
                <input type="text" name="start_time" placeholder="19:30" required>
            </div>

            <div class="form-field">
                <label>Тривалість</label>
                <input type="text" name="duration" placeholder="2 години" required>
            </div>

            <div class="form-field">
                <label>Вікове обмеження</label>
                <input type="text" name="age_limit" placeholder="16+" required>
            </div>

            <div class="form-field">
                <label>Атмосфера</label>
                <input type="text" name="mood" placeholder="камерна, тепла, вечірня" required>
            </div>

            <label class="checkbox-field">
                <input type="checkbox" name="is_featured">
                Featured
            </label>

            <button class="admin-button" type="submit">Зберегти</button>
        </form>
    </section>
</main>

</body>
</html>
