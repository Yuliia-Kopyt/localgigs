<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>LocalGigs</title>

    <style>
        .card {
            border: 1px solid gray;
            padding: 10px;
            margin: 10px;
            background: white;
        }

        .featured {
            border: 3px solid gold;
            background: #fff8dc;
        }

        .badge {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🎶 LocalGigs</h1>

<form method="get" action="/">
    <label for="city">Фільтр за містом:</label>

    <select name="city" id="city">
        <option value="">Усі міста</option>

        {% for city in cities %}
            <option value="{{ city.city }}" {% if selected_city == city.city %}selected{% endif %}>
                {{ city.city }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Показати</button>
    <a href="/">Скинути</a>
</form>

{% for concert in concerts %}
<div class="card {% if concert.is_featured %}featured{% endif %}">

    {% if concert.is_featured %}
        <p class="badge">⭐ Featured</p>
    {% endif %}

    <h2>{{ concert.title }}</h2>
    <p>{{ concert.city }} • {{ concert.genre }} • {{ concert.price }}</p>
    <p>{{ concert.description }}</p>
    <a href="/items/{{ concert.id }}">Детальніше</a>
</div>
{% endfor %}

</body>
</html>
