<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>LocalGigs</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f1ec;
            color: #1f1f1f;
            margin: 0;
            padding: 24px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 16px;
            margin: 16px 0;
            background: white;
            max-width: 720px;
        }

        .featured {
            border: 3px solid #f5b700;
            background: #fff8dc;
        }

        .badge {
            font-weight: bold;
            color: #8a5a00;
        }

        .concert-image {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 12px;
        }

        .meta {
            color: #555;
        }

        a {
            color: #8a3ffc;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🎶 LocalGigs</h1>

<form method="get" action="/">
    <label for="city">Фільтр за містом:</label>

    <select name="city" id="city">
        <option value="">Усі міста</option>

        {% for city in cities %}
            <option value="{{ city.city }}" {% if selected_city == city.city %}selected{% endif %}>
                {{ city.city }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Показати</button>
    <a href="/">Скинути</a>
</form>

{% for concert in concerts %}
<div class="card {% if concert.is_featured %}featured{% endif %}">

    {% if concert.is_featured %}
        <p class="badge">⭐ Featured</p>
    {% endif %}

   <img class="concert-image"
     src="{{ concert.image_url }}"
     onerror="this.onerror=null; this.src='https://via.placeholder.com/800x400?text=No+Image';">

    <h2>{{ concert.title }}</h2>

    <p class="meta">
        {{ concert.city }} • {{ concert.venue }} • {{ concert.genre }} • {{ concert.price }}
    </p>

    <p><strong>Дата:</strong> {{ concert.event_date }}</p>

    <p>{{ concert.description }}</p>

    <a href="/items/{{ concert.id }}">Детальніше</a>
</div>
{% endfor %}

</body>
</html>
